<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 740" role="img" aria-labelledby="title desc">
  <title id="title">LeadPilot AI architecture diagram</title>
  <desc id="desc">A simplified architecture map showing caller traffic through Twilio, FastAPI, Deepgram, LangGraph, ElevenLabs, Supabase, and FSM integrations.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#0b0a07"/>
      <stop offset="100%" stop-color="#11100b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0%" stop-color="#d0a62c"/>
      <stop offset="100%" stop-color="#56b8a3"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .label { fill: #f4efdf; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 18px; font-weight: 700; }
      .small { fill: #b2a994; font-family: 'JetBrains Mono', Consolas, monospace; font-size: 14px; }
      .box { fill: #17150f; stroke: rgba(255,255,255,0.14); stroke-width: 1.5; rx: 18; ry: 18; filter: url(#shadow); }
      .boxAccent { fill: url(#accent); opacity: 0.13; stroke: rgba(208,166,44,0.45); stroke-width: 1.5; rx: 18; ry: 18; filter: url(#shadow); }
      .line { stroke: rgba(244,239,223,0.4); stroke-width: 4; stroke-linecap: round; }
      .lineAccent { stroke: #d0a62c; stroke-width: 5; stroke-linecap: round; }
      .lineTeal { stroke: #56b8a3; stroke-width: 5; stroke-linecap: round; }
      .chip { fill: #0d0c08; stroke: rgba(255,255,255,0.12); stroke-width: 1; rx: 10; ry: 10; }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="740" fill="url(#bg)"/>
  <rect x="24" y="24" width="1152" height="692" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1.5" rx="28" ry="28"/>

  <text x="60" y="78" class="label" font-size="28">LeadPilot AI / inbound call flow</text>
  <text x="60" y="108" class="small">One FastAPI service, one custom domain, one browser landing page.</text>

  <rect x="60" y="165" width="170" height="110" class="boxAccent"/>
  <text x="90" y="210" class="label">Caller</text>
  <text x="90" y="240" class="small">PSTN / mobile</text>

  <rect x="270" y="150" width="215" height="138" class="box"/>
  <text x="305" y="200" class="label">Twilio Voice</text>
  <text x="305" y="228" class="small">webhook + media stream</text>
  <text x="305" y="256" class="small">/voice • /media-stream</text>

  <rect x="525" y="136" width="240" height="170" class="boxAccent"/>
  <text x="560" y="190" class="label">FastAPI app</text>
  <text x="560" y="218" class="small">/ • /voice • /call-status</text>
  <text x="560" y="246" class="small">/media-stream/{call_sid}</text>
  <text x="560" y="274" class="small">/health</text>

  <rect x="820" y="150" width="160" height="114" class="box"/>
  <text x="850" y="198" class="label">Deepgram</text>
  <text x="850" y="226" class="small">live STT</text>

  <rect x="995" y="150" width="150" height="114" class="box"/>
  <text x="1018" y="198" class="label">LLM</text>
  <text x="1018" y="226" class="small">Groq → Mistral</text>

  <rect x="820" y="320" width="160" height="114" class="box"/>
  <text x="846" y="368" class="label">ElevenLabs</text>
  <text x="846" y="396" class="small">Flash TTS</text>

  <rect x="995" y="320" width="150" height="114" class="box"/>
  <text x="1019" y="368" class="label">Twilio &lt;Say/&gt;</text>
  <text x="1019" y="396" class="small">fallback audio</text>

  <rect x="525" y="360" width="240" height="160" class="box"/>
  <text x="560" y="414" class="label">LangGraph FSM</text>
  <text x="560" y="442" class="small">greeting • qualify • route</text>
  <text x="560" y="470" class="small">lead creation • escalation</text>

  <rect x="285" y="382" width="190" height="116" class="box"/>
  <text x="318" y="430" class="label">Supabase</text>
  <text x="318" y="458" class="small">calls, leads, dedup</text>

  <rect x="285" y="540" width="190" height="116" class="box"/>
  <text x="318" y="588" class="label">FSM API</text>
  <text x="318" y="616" class="small">Jobber / Housecall Pro</text>

  <rect x="525" y="560" width="240" height="92" class="boxAccent"/>
  <text x="560" y="597" class="label">Owner SMS</text>
  <text x="560" y="625" class="small">emergencies + summaries</text>

  <path d="M230 220 H270" class="lineAccent"/>
  <path d="M485 219 H525" class="lineAccent"/>
  <path d="M765 218 H820" class="line"/>
  <path d="M765 218 H995" class="line" opacity="0.6"/>
  <path d="M645 306 V360" class="lineTeal"/>
  <path d="M645 520 V560" class="lineTeal"/>
  <path d="M525 430 H475" class="line"/>
  <path d="M525 598 H475" class="line"/>
  <path d="M785 430 H820" class="lineTeal"/>
  <path d="M785 430 H995" class="lineTeal" opacity="0.7"/>
  <path d="M905 264 V320" class="line"/>
  <path d="M1068 264 V320" class="line"/>

  <rect x="52" y="600" width="160" height="36" class="chip"/>
  <text x="72" y="624" class="small">Browser landing page /</text>

  <rect x="52" y="646" width="290" height="36" class="chip"/>
  <text x="72" y="670" class="small">Twilio webhooks remain separate from the homepage</text>
</svg>